name: validate

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Enforce promotion flow to main
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$BASE_REF" = "main" ]; then
            case "$HEAD_REF" in
              develop|hotfix/*) ;;
              *)
                echo "Pull requests into main must come from develop or hotfix/* branches." >&2
                exit 1
                ;;
            esac
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build
